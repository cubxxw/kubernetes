# Kubernetes Workflow Update Go Module Dependency

## Action

Follow the update-go-module-dependency workflow:
1. Update root go.mod and go.sum files with the new dependency version.
2. Update go.mod and go.sum in all relevant staging/src/k8s.io/* submodules.
3. Update go.mod and go.sum in hack/tools or other tool directories if applicable.
4. Update vendor/ directory with the new dependency code and vendor/modules.txt.
5. Commit all changes together.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: go.mod, go.sum, go.work.sum

